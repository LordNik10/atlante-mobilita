# Esegui manualmente da Actions → Playwright report su Pages → Run workflow
name: Playwright report su Pages
on:
  workflow_dispatch:
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm install -g yarn && yarn
      - name: Install Playwright Browsers
        run: yarn playwright install --with-deps
      - name: Run Playwright tests
        env:
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          BASE_URL: ${{ secrets.BASE_URL }}
          NEXT_DATABASE_URL: ${{ secrets.NEXT_DATABASE_URL }}
          NEXT_SUPABASE_URL: ${{ secrets.NEXT_SUPABASE_URL }}
          NEXT_SUPABASE_ANON_KEY: ${{ secrets.NEXT_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_REDIRECT_URL: ${{ secrets.NEXT_PUBLIC_REDIRECT_URL || 'http://localhost:3000' }}
        run: yarn playwright test
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  deploy-report:
    name: Deploy report su GitHub Pages
    needs: test
    if: ${{ !cancelled() && (needs.test.result == 'success' || needs.test.result == 'failure') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment: github-pages
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: playwright-report
      - uses: actions/upload-pages-artifact@3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
      - name: Report URL
        run: |
          echo "Report Playwright: ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
